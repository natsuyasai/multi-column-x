name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prettier --check .
      - run: npm run build:inject
      - run: npm test

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - run: npm run build:inject
      - run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: cargo check (deny warnings)
        run: cargo check --manifest-path src-tauri/Cargo.toml
        env:
          RUSTFLAGS: "-D warnings"
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"
      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # tauri.settings.gradle 等の Tauri 生成 glue は gitignore されローカル絶対パスを含むため
      # CI には存在しない。glue は build/dev 時のみ生成される（init では生成されない）。
      # debug・単一 ABI の android build で glue を生成しつつ Rust/Kotlin/マニフェストも検証する。
      - name: Build Android (debug, glue 生成 + コンパイル検証)
        run: npx tauri android build --debug --apk --target aarch64 --ci
      - name: ktlint & unit tests (app は universal フレーバー必須)
        working-directory: src-tauri/gen/android
        run: |
          chmod +x ./gradlew
          ./gradlew ktlintCheck :app:testUniversalDebugUnitTest
