name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read version from tauri.conf.json
        id: version
        run: echo "version=$(jq -r .version src-tauri/tauri.conf.json)" >> "$GITHUB_OUTPUT"
      - name: Verify tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="${{ steps.version.outputs.version }}"
          if [ "$tag" != "$ver" ]; then
            echo "tag ($tag) != tauri.conf.json version ($ver)"
            exit 1
          fi
      - name: Determine previous tag
        id: prevtag
        run: |
          git fetch --tags --force
          version="${{ steps.version.outputs.version }}"
          current="v$version"
          mapfile -t tags < <(git tag --sort=-version:refname)
          prev=""
          if printf '%s\n' "${tags[@]}" | grep -qx "$current"; then
            found=0
            for t in "${tags[@]}"; do
              if [ "$found" = "1" ]; then prev="$t"; break; fi
              if [ "$t" = "$current" ]; then found=1; fi
            done
            head_ref="$current"
          else
            prev="${tags[0]:-}"
            head_ref="$(git rev-parse HEAD)"
          fi
          echo "prev=$prev" >> "$GITHUB_OUTPUT"
          echo "head=$head_ref" >> "$GITHUB_OUTPUT"
      - name: Create or update draft release with notes
        id: create
        uses: actions/github-script@v7
        env:
          PREV_TAG: ${{ steps.prevtag.outputs.prev }}
          HEAD_REF: ${{ steps.prevtag.outputs.head }}
          VERSION: ${{ steps.version.outputs.version }}
        with:
          result-encoding: string
          script: |
            const path = require("node:path");
            const { pathToFileURL } = require("node:url");
            const { buildReleaseBody } = await import(
              pathToFileURL(
                path.join(process.env.GITHUB_WORKSPACE, "scripts", "releaseNotes.mjs"),
              ).href,
            );

            const version = process.env.VERSION;
            const tag = `v${version}`;
            const prev = process.env.PREV_TAG;
            const head = process.env.HEAD_REF;

            // 前タグ〜HEAD のコミットに紐づくマージ済み PR を収集する
            const prMap = new Map();
            if (prev) {
              const { data: cmp } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: prev,
                head,
              });
              for (const commit of cmp.commits) {
                const { data: associated } =
                  await github.rest.repos.listPullRequestsAssociatedWithCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    commit_sha: commit.sha,
                  });
                for (const pr of associated) {
                  if (pr.merged_at) prMap.set(pr.number, pr);
                }
              }
            }

            const prs = [...prMap.values()].map((pr) => ({
              title: pr.title,
              body: pr.body,
              labels: (pr.labels ?? []).map((l) =>
                typeof l === "string" ? l : l.name,
              ),
            }));

            const body = buildReleaseBody(prs);
            console.log(`generated release body (${prs.length} PRs):\n${body}`);

            const existing = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const found = existing.data.find((r) => r.tag_name === tag);
            if (found) {
              if (body) {
                await github.rest.repos.updateRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: found.id,
                  body,
                });
              }
              return String(found.id);
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `MultiColumnX ${tag}`,
              body,
              draft: true,
              prerelease: false,
            });
            return String(data.id);

  desktop:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
      - name: Upload CI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/**/*
          if-no-files-found: warn

  android:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - name: Install Android NDK
        run: sdkmanager "ndk;26.1.10909125"
      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      - name: Restore Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload-keystore.jks"
          cat > src-tauri/gen/android/keystore.properties <<EOF
          password=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=$RUNNER_TEMP/upload-keystore.jks
          EOF
      - name: Build signed APK
        run: npm run build:inject && npx tauri android build --apk
      - name: Upload APK to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          apk=$(find src-tauri/gen/android/app/build/outputs/apk -name "*universal*release*.apk" | head -n1)
          if [ -z "$apk" ]; then
            echo "APK not found"
            find src-tauri/gen/android -name "*.apk"
            exit 1
          fi
          cp "$apk" "MultiColumnX_${VERSION}_universal.apk"
          gh release upload "v${VERSION}" "MultiColumnX_${VERSION}_universal.apk" --clobber
      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*release*.apk
          if-no-files-found: warn

  publish-release:
    needs: [create-release, desktop, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false,
            });
